	/**

	 */
	.tox .tox-promotion {
		display: none !important;
	}
</style>

		document.write(decodeURIComponent('%3Cscript%20src%3D%22%2Fassets%2Fplugins%2F[+editorKey+]%2Fjs%2Fjs.cookie.js%22%3E%3C%2Fscript%3E'));
	}
</script>
<!--script src="/assets/plugins/[+editorKey+]/js/js.cookie.js"></script-->
<script type="text/javascript">
	var editorCallback = null;
	var currentFieldId = null;
	var icon_header = "fa fa-folder-open";
	function openFileManagerForTinyMCE(field_type, callback, directory = '') {
		let evoMod = window.modx || window.parent.modx || window.parent.parent.modx;
		let popup;
		let pWidth;
		let pHeight;
		let myReq;
		let intIframe;
		let popupIframe;

		const fieldId = currentFieldId || 'default_field_id';

		const url = '/manager/media/browser/[+which_browser+]/browse.php?opener=[+editorKey+]&type='+field_type+'&field_id=' + encodeURIComponent(fieldId) + directory;
		const eventHandler = (event) => {
			//
			let data = typeof event.data == "string" ? JSON.parse(event.data) : event.data;
			switch(data.type){
				case "kcfinder:change-title":
					if(evoPopupHeader) {
						const regex = /^(kcfinder)/i;
						const subst = `<i class="${icon_header}"></i>$1`;
						data.title = data.title.replace(regex, subst);
						evoPopupHeader.innerHTML = data.title;
					}
					break;
			}
		};
		const iframeLoad = function(e) {
			if (e.target.contentDocument.title) {
				// Если есть шапка попапа
				if(evoPopupHeader) {
					// Перезапись заголовка
					const regex = /^(kcfinder)/i;
					const subst = `<i class="${icon_header}"></i>$1`;
					evoPopupHeader.innerHTML = e.target.contentDocument.title.replace(regex, subst);
					// Остановить прелоадер
					evoMod.main.stopWork();
				}
			}
		}
		// Ресайз попапа с kcfinder
		// По ресайзу есть идея переделать.
		// Пока оставим как есть
		const eventResizeHandler = function() {
			if ( popup ) {
				let w,
					h,
					cw = typeof Cookies == "object" ? Cookies.get('KCFINDER_[+editorKey+]_popup_width') : '99%',
					ch = typeof Cookies == "object" ? Cookies.get('KCFINDER_[+editorKey+]_popup_height') : '99%';
				w = parseInt(100 * popup.el.offsetWidth / window.innerWidth) + '%';
				h = parseInt(100 * popup.el.offsetHeight / window.innerHeight) + '%';
				if ( w != parseInt(cw) + '%' ) {
					if(typeof Cookies == "object"){
						Cookies.set('KCFINDER_[+editorKey+]_popup_width', parseInt(w), { expires: 7, path: '' });
					}
				}
				if ( h != parseInt(ch) + '%' ) {
					if(typeof Cookies == "object"){
						Cookies.set('KCFINDER_[+editorKey+]_popup_height', parseInt(h), { expires: 7, path: '' });
					}
				}
				myReq = requestAnimationFrame(eventResizeHandler);
			} else {
				cancelAnimationFrame(myReq);
			}
		};
		pWidth = typeof Cookies == "object" ? (Cookies.get('KCFINDER_[+editorKey+]_popup_width') || '99%') : '99%';
		pHeight = typeof Cookies == "object" ? (Cookies.get('KCFINDER_[+editorKey+]_popup_height') || '99%') : '99%';
		pWidth = parseInt(pWidth) > 99 ? '99%' : pWidth;
		pHeight = parseInt(pHeight) > 99 ? '99%' : pHeight;
		// pWidth = '99%';
		// pHeight = '99%';
		// Открываем через API modx
		if(typeof evoMod == 'object') {
			window.KCFinder = {
				callBack: function(url) {
					window.KCFinder = null;
					callback(url);
				}
			};
			popup = evoMod.popup(
				{
					addclass: 'kcfinder_popup',
					url: url,
					title: "KCFinder",
					icon: icon_header,
					iframe: 'iframe',
					position: 'center center',
					width: parseInt(pWidth) + '%',
					height: parseInt(pHeight) + '%',
					hide: 0,
					hover: 0,
					resize: !0,
					overlay: 1,
					overlayclose: 1,
					// Высокий z-index чтобы перекрыть диалоги TinyMCE
					zIndex: 90000,
					onclose: function(e, obj) {
						if(typeof reloadElementsInTree == 'function'){
							setTimeout(reloadElementsInTree, 400);
						}
						popupIframe && popupIframe.removeEventListener('load', iframeLoad)
						// Удалить
						popupIframe = null;
						evoPopupHeader = null;
						window.removeEventListener('message', eventHandler);
						// остановка
						cancelAnimationFrame(myReq);
						popup = null;
					},
					// Если подобная функция всё же будет
					onshow: function(e, obj) {
						evoPopupHeader = obj.querySelector('.evo-popup-header');
						popupIframe = obj.querySelector('iframe');
						// Подписываемся на события
						window.addEventListener('message', eventHandler);
						// Старт ресайза.
						myReq = requestAnimationFrame(eventResizeHandler);
						popupIframe && popupIframe.addEventListener('load', iframeLoad);
					},
					wrap: document.body
				}
			);
		}
	}

	function SetUrl(url) {
		if (editorCallback) {
			editorCallback(url);
			editorCallback = null;
		}
	}
</script>
<script>
	/**
	 * file_browser_callback существует только у TinyMCE4
	 * Поэтому берём функцию file_picker_callback.
	 * По сути file_picker_callback должен работать в TinyMCE-4
	 */
	var config_[+editorKey+]_[+themeKey+] = {
		license_key: 'gpl',
		[+configString+],
		file_picker_callback: function (callback, value, meta) {
			//console.log([...arguments]);
			let type = meta.filetype || "file";
			let field = meta.fieldname || "";
			let url = (typeof meta.original == "object") ? meta.original.value : "";
			// meta.original - в 99% его нет
			if(url == "") {
				url = value;
			}
			switch(type) {
				case "image":
				case "file":
					type = `${type}s`
					break;
			}
			var path = String(url).split("/"),
				directory = "";
			path.shift();
			path.pop();
			path = path.join("/");
			if(path!=""){
				directory += "&dir="+path;
			}
			openFileManagerForTinyMCE(type, callback, directory);
		},
		'file_picker_types': 'image file media'
		[+pp.customParams+]
	}
</script>
